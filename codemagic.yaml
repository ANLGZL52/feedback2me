# Codemagic — Flutter iOS (ve isteğe bağlı Android) derlemesi
# Kurulum: https://docs.codemagic.io/flutter-configuration/flutter-projects/
#
# Codemagic panelinde yapılacaklar:
# 1) App → Environment variables: App Store Connect API key veya Apple Developer entegrasyonu
# 2) iOS code signing (manuel): Codemagic Settings → Code signing identities:
#    - iOS certificates: Distribution .p12 (+ şifre)
#    - iOS provisioning profiles: App Store .mobileprovision (Bundle ID: app.feedbacktome)
# 3) İsterseniz "Variable groups" ile BUNDLE_ID vb. paylaşın
#
# BUNDLE_ID, Xcode ile aynı: app.feedbacktome (ios/Runner)

workflows:
  ios-release:
    name: iOS Release (IPA)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      # Yüklenen .p12 + .mobileprovision’ı build VM’e kopyalar; keychain add-certificates tek başına yetmez.
      # Code signing identities’teki profil/sertifika bu bundle id ile eşleşmeli (App Store).
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.feedbacktome
      vars:
        BUNDLE_ID: app.feedbacktome
      # Panelden "Variable group" ekleyebilirsiniz; örnek isim:
      # groups:
      #   - ios_signing
    # Team integrations → App Store Connect’te verdiğiniz ad ile aynı olmalı (ör. feedback2me).
    integrations:
      app_store_connect: feedback2me
    scripts:
      - name: Flutter bağımlılıkları
        script: |
          set -e
          flutter pub get
      - name: CocoaPods
        script: |
          set -e
          cd ios
          pod install
      # Sıra: keychain → sertifikaları ekle → use-profiles (Manuel imza + export_options.plist) → flutter ipa
      - name: Keychain ve sertifikalar
        script: |
          set -e
          keychain initialize
          keychain add-certificates
      - name: Xcode proje profilleri (App Store)
        script: |
          set -e
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --archive-method app-store \
            --code-signing-setup-verbose-logging
      - name: IPA derle
        script: |
          set -e
          # use-profiles genelde $HOME/export_options.plist üretir; verilmezse export "provisioning profile" hatası verir.
          if [ -f "$HOME/export_options.plist" ]; then
            flutter build ipa --release --export-options-plist="$HOME/export_options.plist"
          else
            echo "WARN: $HOME/export_options.plist yok, doğrudan flutter build ipa deneniyor."
            flutter build ipa --release
          fi
          # .ipa yoksa Publishing "No artifacts" der; hatayı burada net göster.
          if ! compgen -G "build/ios/ipa/*.ipa" > /dev/null; then
            echo "ERROR: build/ios/ipa/*.ipa bulunamadı (export/imza/bundle id kontrol edin)."
            find build/ios -name "*.ipa" 2>/dev/null || true
            ls -la build/ios/ipa 2>/dev/null || true
            exit 1
          fi
          ls -la build/ios/ipa/*.ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/**
      - /tmp/xcodebuild_logs/*.log
    # Mac/Transporter olmadan: build sonrası IPA App Store Connect’e gider → TestFlight’ta görünür.
    # API anahtarı: App Manager (veya Admin). integration adı yukarıdaki app_store_connect ile aynı olmalı.
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # İmzasız veya yalnızca derleme testi için basit iş akışı (CI smoke):
  ios-debug-build:
    name: iOS Debug (imza gerektirmez — yalnızca derleme doğrulama)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get + iOS build (no codesign)
        script: |
          set -e
          flutter pub get
          cd ios && pod install && cd ..
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
