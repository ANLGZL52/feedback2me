<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FeedbackToMe - Kişisel feedback linki">
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="feedback_to_me">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>feedback_to_me</title>
  <link rel="manifest" href="manifest.json">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #141210;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.getElementById("loading-fallback")?.remove();
      document.body.style.background = "transparent";
    }

    // Flutter view DOM'a düşünce HTML fallback katmanını temizle.
    function removeFallbackWhenFlutterReady() {
      const hasFlutterView = () =>
        !!document.querySelector("flutter-view, flt-glass-pane, flt-scene-host");

      const tryRemove = () => {
        if (hasFlutterView()) {
          removeSplashFromWeb();
          return true;
        }
        return false;
      };

      if (tryRemove()) return;

      const observer = new MutationObserver(() => {
        if (tryRemove()) observer.disconnect();
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });

      // DOM mutasyonu kaçarsa diye kısa aralıkla da kontrol et.
      const interval = setInterval(() => {
        if (tryRemove()) clearInterval(interval);
      }, 250);

      // 15 sn sonra fallback hata mesajı gösteriliyorsa interval'ı bırak.
      setTimeout(() => clearInterval(interval), 16000);
    }
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>
<body>
  <div id="loading-fallback" style="position:fixed;inset:0;background:#141210;color:#fff;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:20px;z-index:9999;">Yükleniyor...</div>
  <!-- Firebase: Sadece SDK yüklenir; Flutter Dart kodu initialize edecek (çift başlatma önlenir) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  <script src="flutter_bootstrap.js" async=""></script>
  <script>
    removeFallbackWhenFlutterReady();
    setTimeout(function() {
      if (document.getElementById('splash') && !document.querySelector('flutter-view')) {
        var div = document.createElement('div');
        div.id = 'load-fallback';
        div.style.cssText = 'position:fixed;inset:0;background:#141210;color:#fff;display:flex;align-items:center;justify-content:center;padding:24px;font-family:sans-serif;text-align:center;';
        div.innerHTML = '<div>Uygulama yüklenemedi.<br>F12 &rarr; Console sekmesinde kırmızı hata var mı kontrol et.</div>';
        document.body.appendChild(div);
      }
    }, 15000);
  </script>
</body></html>
